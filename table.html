<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table, th, td{
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <table width="100%">
        <caption>상품 구성</caption>
        <tr>
            <th>용도</th>
            <th>중량</th>
            <th>개수</th>
            <th>가격</th>
        </tr>
        <tr>
            <th rowspan="2">선물용</th>
            <th>3kg</th>
            <th>11-16</th>
            <th>35,000원</th>
        </tr>
        <tr>
            <th>5kg</th>
            <th>18-26</th>
            <th>52,000원</th>
        </tr>
        <tr>
            <th rowspan="2">가정용</th>
            <th>3kg</th>
            <th>11-16</th>
            <th>35,000원</th>
        </tr>
        <tr>
            <th>5kg</th>
            <th>18-26</th>
            <th>52,000원</th>
        </tr>
        <tr>
            <td>5kg</td>
            <td colspan="2">18-26 47,000원</td>
        </tr>
    </table>
</body>
</html>
