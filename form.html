<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>상품 선택</legend>
        </fieldset>

        <fieldset>
            <legend>배송정보</legend>
        </fieldset>
    </form>

    <h1>Form basic</h1>
    <form>
        <label for="fname">First name:</label>
        <input type="text" id="fname" name="fname" value="John"><br>

        <label for="lname">Last name:</label>
        <input type="text" id="lname" name="lname" value="Doe"><br>

        <input type="submit" value="Submit">
    </form>

    <p>Choose your favorite Web language:</p>

    <form>
        <input type="radio" id="html" name="fav_language" value="HTML" checked>
        <label for="html">HTML</label><br>

        <input type="radio" id="css" name="fav_language" value="CSS">
        <label for="css">CSS</label><br>

        <input type="radio" id="javascript" name="fav_language" value="JavaScript">
        <label for="javascript">JavaScript</label><br><br>

        <input type="radio" id="python" name="fav_language1" value="Python">
        <label for="python">PYTHON</label><br>

        <input type="radio" id="C++" name="fav_language1" value="C++">
        <label for="c++">C++</label><br>
    </form> 

    <h2>Checkboxes</h2>
    <p>The <strong>input type="checkbox"</strong> defines a checkbox:</p>

    <form action="">

        <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike" checked>
        <label for="vehicle1"> I have a bike</label><br>

        <input type="checkbox" id="vehicle2" name="vehicle2" value="Car">
        <label for="vehicle2"> I have a car</label><br>

        <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat">
        <label for="vehicle3"> I have a boat</label><br><br>

        <input type="submit" value="Submit 제출" />
    </form> 

    <h1>Input Type</h1>
    <form>
        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username"><br>

        <label for="pwd">Password:</label><br>
        <input type="password" id="pwd" name="pwd"><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

        <input type="button" onclick="alert('Hello World!')" value="Click Me!">
        <button onclick="alert('헬로월드!')">Click me!!!!!!!!</button>
        <br><br>

        <label for="favcolor">Select your favorite color:</label>
        <input type="color" id="favcolor" name="favcolor">
        <br><br>

        <label for="birthday">Birthday:</label>
        <input type="date" id="birthday" name="birthday">

        <label for="datemin">Enter a date after 2000-01-01:</label>
        <input type="date" id="datemin" name="datemin" min="2000-01-02"><br><br>

        <label for="datemax">Enter a date before 1980-01-01:</label>
        <input type="date" id="datemax" name="datemax" max="1979-12-31"><br><br>

        <label for="birthdaytime">Birthday (date and time):</label>
        <input type="datetime-local" id="birthdaytime" name="birthdaytime"><br><br>

        <label for="email">Enter your email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="myfile">Select a file:</label>
        <input type="file" id="myfile" name="myfile">

        <input type="hidden" id="custId" name="custId" value="3487"><br><br>

        <label for="quantity">Quantity (between 1 and 5):</label>
        <input type="number" id="quantity" name="quantity" min="1" max="5"><br><br>

        <label for="vol">Volume (between 0 and 50):</label>
        <input type="range" id="vol" name="vol" min="0" max="50"><br><br>

        <label for="phone">Enter your phone number:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"><br><br>

        <label for="appt">Select a time:</label>
        <input type="time" id="appt" name="appt"><br><br>
    </form>

    <h1>The select element</h1>

    <p>The select element is used to create a drop-down list.</p>

    <form>
    <label for="cars">Choose a car:</label>
    <select name="cars" id="cars">
        <option value="volvo">Volvo</option>
        <option value="saab">Saab</option>
        <option value="opel">Opel</option>
        <option value="audi">Audi</option>
    </select>
    <br><br>
    <input type="submit" value="Submit"><br><br>
    </form>

    <h1>The textarea element</h1>

    <form>
        <p><label for="w3review">Review of W3Schools:</label></p>
        <textarea id="w3review" name="w3review" rows="4" cols="50">At w3schools.com you will learn how to make a website. They offer free tutorials in all web development technologies.</textarea>
        <br>
        <input type="submit" value="Submit">
    </form>

</body>
</html>
