<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* 🎨 글자색 검정 유지 및 입력 폼 정렬 스타일 */
      fieldset, legend, label, input {
        color: black;
      }

      fieldset {
        margin-left: 20px;
        max-width: 600px;
        padding: 20px;
        border: 1px solid #cccccc; /* 은은한 그레이 테두리 */
        border-radius: 6px; /* 모서리 살짝 라운딩 */
      }

      legend {
        margin-left: 10px;
        font-weight: bold;
        padding: 0 10px;
      }

      /* 텍스트 입력창과 이메일 창 줄바꿈 정렬 및 크기 최적화 */
      input[type="text"], 
      input[type="password"], 
      input[type="email"] {
        margin: 8px 0 16px 20px;
        padding: 6px 10px;
        width: 80%;
        max-width: 300px;
        border: 1px solid #cccccc;
        border-radius: 4px;
        display: inline-block;
      }

      /* 라벨이 줄바꿈 되어도 텍스트 창과 잘 맞아떨어지도록 설정 */
      label {
        margin-left: 20px;
        font-weight: 500;
      }

      /* 라디오 버튼 및 체크박스 정렬 (글자와 한 줄에 이쁘게 묶이도록) */
      input[type="radio"],
      input[type="checkbox"] {
        margin-left: 20px;
        vertical-align: middle;
      }

      input[type="radio"] + label,
      input[type="checkbox"] + label {
        margin-left: 5px;
        margin-right: 15px;
        display: inline-block;
        vertical-align: middle;
      }

      /* 하단 등록/초기화 버튼 스타일 기본 정돈 */
      input[type="submit"], 
      input[type="reset"] {
        margin-left: 20px;
        padding: 6px 16px;
        border: 1px solid #999999;
        background-color: #f5f5f5;
        border-radius: 4px;
        cursor: pointer;
      }
      
      input[type="submit"] {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo">WebDemo</div>
        <ul class="nav">
          <li><a href="index.html">Home</a></li>
          <li><a href="list.html">List</a></li>
          <li><a href="timetable.html">Timetable</a></li>
          <li><a href="media.html">Media</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </div>
    </nav>

    <section class="main">
      <div class="container">
        <h1>사용자 등록</h1>
        <form>
          <fieldset>
            <legend>기본 정보</legend>
            <label for="username">아이디:</label><br />
            <input
              type="text"
              id="username"
              name="username"
              placeholder="아이디 입력"
            /><br />

            <label for="pwd">비밀번호:</label><br />
            <input
              type="password"
              id="pwd"
              name="pwd"
              placeholder="비밀번호 입력"
            /><br />

            <label for="email">이메일:</label><br />
            <input
              type="email"
              id="email"
              name="email"
              placeholder="이메일 입력"
            />

          </fieldset>

          <br />

          <fieldset>
            <legend>부가 정보</legend>
            
            <label>성별:</label><br />
            <div style="margin-top: 8px; margin-bottom: 16px;">
              <input type="radio" id="male" name="gender" value="male" />
              <label for="male">남성</label>
              
              <input type="radio" id="female" name="gender" value="female" />
              <label for="female">여성</label>
            </div>

            <label>관심 분야:</label><br />
            <div style="margin-top: 8px; margin-bottom: 16px;">
              <input type="checkbox" id="web" name="interest" value="web" />
              <label for="web">웹</label>

              <input type="checkbox" id="system" name="interest" value="system" />
              <label for="system">시스템</label>

              <input type="checkbox" id="network" name="interest" value="network" />
              <label for="network">클라우드</label>

              <input type="checkbox" id="ai" name="interest" value="ai" />
              <label for="ai">AI</label>
            </div>
          </fieldset>

          <br />
          <input type="submit" value="등록 하기" />
          <input type="reset" value="다시 쓰기" />
        </form>
      </div>
    </section>
    <script src="main.js"></script>
  </body>
</html>
